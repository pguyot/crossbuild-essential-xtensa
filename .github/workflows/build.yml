name: Build Xtensa GNU Toolchain DEB Package

on:
  push:

jobs:
  get-version:
    runs-on: ubuntu-22.04
    outputs:
      release_tag: ${{ steps.get_version.outputs.release_tag }}
      is_tag: ${{ steps.get_version.outputs.is_tag }}
    steps:
      - name: Get version
        id: get_version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/xtensa-toolchain-* ]]; then
            # Extract crosstool-NG tag from our release tag
            # e.g. xtensa-toolchain-esp-13.2.0_20230928 -> esp-13.2.0_20230928
            TAG_NAME="${GITHUB_REF#refs/tags/xtensa-toolchain-}"
            echo "release_tag=${TAG_NAME}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "Building toolchain for crosstool-NG tag: ${TAG_NAME}"
          else
            # Get latest espressif/crosstool-NG release for non-tag builds
            LATEST_TAG=$(curl -s https://api.github.com/repos/espressif/crosstool-NG/releases \
              | jq -r '.[0].tag_name')
            echo "release_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "Building latest espressif/crosstool-NG version: ${LATEST_TAG}"
          fi

  build:
    needs: get-version
    runs-on: ubuntu-24.04
    timeout-minutes: 480  # crosstool-NG builds can take 3–4 hours
    strategy:
      matrix:
        variant:
          - { core: lx6, chip: esp32,   name: "ESP32/ESP32-S2 (LX6)" }
          - { core: lx7, chip: esp32s3, name: "ESP32-S3 (LX7)"       }

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          # crosstool-NG builds need ~15 GB of free disk space
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Install build dependencies
        run: |
          sudo sed -i 's/^\(\s*Types:\s*\)deb\(.*\)/\1deb deb-src\2/' \
            /etc/apt/sources.list.d/ubuntu.sources
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ gperf bison flex texinfo help2man make libncurses5-dev \
            python3-dev autoconf automake libtool libtool-bin gawk wget curl \
            bzip2 xz-utils unzip git patch pkg-config cmake ninja-build \
            libssl-dev libexpat1-dev \
            dpkg-dev devscripts debhelper \
            qemu-user

      - name: Clone espressif/crosstool-NG
        run: |
          git clone --depth 1 \
            --branch ${{ needs.get-version.outputs.release_tag }} \
            https://github.com/espressif/crosstool-NG.git

      - name: Bootstrap crosstool-NG
        run: |
          cd crosstool-NG
          ./bootstrap
          ./configure --enable-local
          make

      - name: Build xtensa-${{ matrix.variant.core }}-linux-gnu toolchain
        run: |
          cd crosstool-NG

          # Copy our defconfig into the crosstool-NG tree.
          # ct-ng reads .defconfig by default; DEFCONFIG= overrides the path.
          # Some versions only support the .defconfig convention, so we use both.
          DEFCONFIG_SRC="${GITHUB_WORKSPACE}/ct-ng-configs/xtensa-${{ matrix.variant.core }}-linux-gnu.defconfig"
          cp "${DEFCONFIG_SRC}" .defconfig

          # Override CT_PREFIX_DIR to the actual install path
          # (the defconfig uses the literal /opt/... path, which is fine,
          #  but let's be explicit in case the defconfig value doesn't parse)
          sed -i 's|^CT_PREFIX_DIR=.*|CT_PREFIX_DIR="/opt/xtensa-${{ matrix.variant.core }}"|' \
            .defconfig

          # Expand defconfig into full .config
          ./ct-ng defconfig DEFCONFIG=.defconfig

          # Show key config values for debugging
          grep -E '^CT_(ARCH|TARGET|KERNEL|LIBC|GCC|BINUTILS|PREFIX)' .config | head -30

          # Build (logs go to .build/build.log on failure)
          ./ct-ng build CT_JOBS=$(nproc) || {
            echo "Build failed. Last 100 lines of build log:"
            tail -100 .build/build.log 2>/dev/null || true
            exit 1
          }

      - name: Verify toolchain installation
        run: |
          TARGET="xtensa-${{ matrix.variant.core }}-linux-gnu"
          echo "=== Compiler version ==="
          /opt/xtensa-${{ matrix.variant.core }}/bin/${TARGET}-gcc --version
          echo ""
          echo "=== Sysroot ==="
          SYSROOT=$(/opt/xtensa-${{ matrix.variant.core }}/bin/${TARGET}-gcc -print-sysroot)
          echo "Sysroot: ${SYSROOT}"
          ls "${SYSROOT}/usr/lib/" | head -20
          echo ""
          echo "=== Smoke test: compile a Hello World ==="
          cat > /tmp/hello.c << 'EOF'
          #include <stdio.h>
          int main(void) { printf("Hello from xtensa-${{ matrix.variant.core }}!\n"); return 0; }
          EOF
          /opt/xtensa-${{ matrix.variant.core }}/bin/${TARGET}-gcc \
            -o /tmp/hello-${{ matrix.variant.core }} /tmp/hello.c
          file /tmp/hello-${{ matrix.variant.core }}
          echo ""
          echo "=== qemu-user test ==="
          SYSROOT=$(/opt/xtensa-${{ matrix.variant.core }}/bin/${TARGET}-gcc -print-sysroot)
          qemu-xtensa -L "${SYSROOT}" /tmp/hello-${{ matrix.variant.core }}

      - name: Create toolchain DEB package
        run: |
          TARGET="xtensa-${{ matrix.variant.core }}-linux-gnu"
          PKG_NAME="xtensa-${{ matrix.variant.core }}-linux-gnu-toolchain"
          PKG_VERSION="${{ needs.get-version.outputs.release_tag }}"
          # Strip characters not valid in Debian version fields
          PKG_VERSION=$(echo "${PKG_VERSION}" | tr '_' '-')
          PKG_ARCH="amd64"
          PKG_DIR="${PKG_NAME}_${PKG_VERSION}_${PKG_ARCH}"

          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/opt"
          cp -r /opt/xtensa-${{ matrix.variant.core }} "${PKG_DIR}/opt/"

          INSTALLED_SIZE=$(du -sk "${PKG_DIR}/opt" | cut -f1)

          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: ${PKG_NAME}
          Version: ${PKG_VERSION}
          Section: devel
          Priority: optional
          Architecture: ${PKG_ARCH}
          Installed-Size: ${INSTALLED_SIZE}
          Maintainer: GitHub Actions <noreply@github.com>
          Description: Xtensa GNU Toolchain for ${{ matrix.variant.name }} (Linux/glibc)
           Cross-compilation toolchain for Xtensa ${{ matrix.variant.name }} targeting
           Linux userspace with glibc.  Uses the windowed register ABI (call8),
           matching the ESP-IDF ABI, so binaries are ABI-compatible with ESP-IDF
           compiled code.
           .
           Suitable for cross-compiling AtomVM and running tests under qemu-user-xtensa.
           .
           Built from espressif/crosstool-NG ${{ needs.get-version.outputs.release_tag }}.
           .
           Core: ${{ matrix.variant.core }}
           Chip: ${{ matrix.variant.chip }}
           Target triple: ${TARGET}
           Languages: C and C++
          Homepage: https://github.com/espressif/crosstool-NG
          EOF

          cat > "${PKG_DIR}/DEBIAN/postinst" << 'POSTINST_EOF'
          #!/bin/bash
          set -e
          echo "=========================================="
          echo "Xtensa toolchain installed to /opt/xtensa-${{ matrix.variant.core }}"
          echo "=========================================="
          echo "Add /opt/xtensa-${{ matrix.variant.core }}/bin to your PATH:"
          echo "  export PATH=/opt/xtensa-${{ matrix.variant.core }}/bin:\$PATH"
          echo ""
          echo "Run xtensa binaries with:"
          echo "  SYSROOT=\$(/opt/xtensa-${{ matrix.variant.core }}/bin/xtensa-${{ matrix.variant.core }}-linux-gnu-gcc -print-sysroot)"
          echo "  qemu-xtensa -L \"\${SYSROOT}\" ./your-binary"
          POSTINST_EOF
          chmod 755 "${PKG_DIR}/DEBIAN/postinst"

          dpkg-deb --build --root-owner-group "${PKG_DIR}"

          echo "deb_file=${PKG_DIR}.deb" >> $GITHUB_ENV
          echo "pkg_version=${PKG_VERSION}" >> $GITHUB_ENV
          echo "pkg_name=${PKG_NAME}" >> $GITHUB_ENV

      - name: Update PATH for subsequent steps
        run: |
          echo "/opt/xtensa-${{ matrix.variant.core }}/bin" >> $GITHUB_PATH

      - name: Extract glibc packages from sysroot
        run: |
          mkdir -p build
          bash scripts/build-glibc.sh ${{ matrix.variant.core }} ${{ matrix.variant.chip }}

      - name: List glibc packages
        run: |
          echo "=== glibc packages ==="
          ls -lh build/libc6-${{ matrix.variant.core }}*.deb \
                 build/libc6-dev-${{ matrix.variant.core }}*.deb \
                 build/libc6-dbg-${{ matrix.variant.core }}*.deb 2>/dev/null || true
          for deb in build/libc6*-${{ matrix.variant.core }}*.deb; do
            [ -f "$deb" ] && dpkg-deb -c "$deb"
          done

      - name: Build zlib packages
        run: |
          bash scripts/build-zlib.sh ${{ matrix.variant.core }} ${{ matrix.variant.chip }}

      - name: List zlib packages
        run: |
          echo "=== zlib packages ==="
          ls -lh build/zlib1g*-${{ matrix.variant.core }}*.deb 2>/dev/null || true

      - name: Build mbedtls packages
        run: |
          bash scripts/build-mbedtls.sh ${{ matrix.variant.core }} ${{ matrix.variant.chip }}

      - name: List mbedtls packages
        run: |
          echo "=== mbedtls packages ==="
          ls -lh build/libmbed*-${{ matrix.variant.core }}*.deb 2>/dev/null || true

      - name: Upload DEB packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.pkg_name }}-${{ env.pkg_version }}
          path: |
            *.deb
            build/*.deb
          retention-days: 90

  create-release:
    needs: [get-version, build]
    runs-on: ubuntu-24.04
    if: needs.get-version.outputs.is_tag == 'true'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages

      - name: Display structure of downloaded files
        run: ls -R packages

      - name: Move packages to release directory
        run: |
          mkdir -p release-packages
          find packages -name "*.deb" -exec mv {} release-packages/ \;
          ls -lh release-packages/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ github.repository }}
          tag_name: xtensa-toolchain-${{ needs.get-version.outputs.release_tag }}
          name: Xtensa GNU Toolchain ${{ needs.get-version.outputs.release_tag }}
          body: |
            # Xtensa GNU Toolchain DEB Packages

            Based on espressif/crosstool-NG: **${{ needs.get-version.outputs.release_tag }}**

            ## Packages

            Two variants are provided, one per ESP32 core generation:

            | Package | Core | Chips | ABI |
            |---------|------|-------|-----|
            | xtensa-lx6-linux-gnu-toolchain | LX6 | ESP32, ESP32-S2 | windowed (call8) |
            | xtensa-lx7-linux-gnu-toolchain | LX7 | ESP32-S3 | windowed (call8) |

            Each toolchain package also ships with matching glibc, zlib, and mbedTLS
            packages for cross-compilation.

            **ABI note**: The windowed register calling convention (call8) matches the
            ESP-IDF default, so cross-compiled libraries are ABI-compatible with
            ESP-IDF builds.

            **Languages**: C and C++

            ## Installation

            ```bash
            # LX6 (ESP32 / ESP32-S2)
            sudo dpkg -i xtensa-lx6-linux-gnu-toolchain_*.deb
            export PATH=/opt/xtensa-lx6/bin:$PATH

            # LX7 (ESP32-S3)
            sudo dpkg -i xtensa-lx7-linux-gnu-toolchain_*.deb
            export PATH=/opt/xtensa-lx7/bin:$PATH

            # Install cross-compilation libraries (example for lx6)
            sudo dpkg -i libc6-lx6_*.deb libc6-dev-lx6_*.deb
            sudo dpkg -i zlib1g-lx6_*.deb zlib1g-dev-lx6_*.deb
            sudo dpkg -i libmbedcrypto7-lx6_*.deb libmbedx509-1-lx6_*.deb \
                         libmbedtls14-lx6_*.deb libmbedtls-dev-lx6_*.deb
            ```

            ## Running with qemu-user

            ```bash
            # Compile
            xtensa-lx6-linux-gnu-gcc -o hello hello.c

            # Run under qemu-user-xtensa
            SYSROOT=$(xtensa-lx6-linux-gnu-gcc -print-sysroot)
            qemu-xtensa -L "$SYSROOT" ./hello
            ```

            ## Target Details
            - **Platform**: Linux (ELF, glibc)
            - **ABI**: Windowed register file (call8) — ESP-IDF compatible
            - **Multilib**: Disabled
            - **Toolchain prefix (lx6)**: xtensa-lx6-linux-gnu-
            - **Toolchain prefix (lx7)**: xtensa-lx7-linux-gnu-
          files: release-packages/*.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
