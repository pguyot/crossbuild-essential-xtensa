name: Build Xtensa GNU Toolchain DEB Package

on:
  push:

jobs:
  get-version:
    runs-on: ubuntu-22.04
    outputs:
      gcc_version: ${{ steps.get_version.outputs.gcc_version }}
      release_tag: ${{ steps.get_version.outputs.release_tag }}
      is_tag: ${{ steps.get_version.outputs.is_tag }}
    steps:
      - name: Get version
        id: get_version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/xtensa-toolchain-* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/xtensa-toolchain-}"
            echo "gcc_version=${TAG_NAME}" >> $GITHUB_OUTPUT
            echo "release_tag=${TAG_NAME}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "Building toolchain for GCC version from tag: ${TAG_NAME}"
          else
            # Default GCC version — Ubuntu 24.04 ships gcc-14 (14.2.0)
            GCC_VERSION="14.2.0"
            echo "gcc_version=${GCC_VERSION}" >> $GITHUB_OUTPUT
            echo "release_tag=${GCC_VERSION}" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "Building toolchain with GCC ${GCC_VERSION}"
          fi

  build:
    needs: get-version
    runs-on: ubuntu-24.04
    timeout-minutes: 480  # full 3-stage build takes ~3-4 h per variant
    strategy:
      matrix:
        variant:
          - { core: lx6, chip: esp32,   name: "ESP32/ESP32-S2 (LX6)" }
          - { core: lx7, chip: esp32s3, name: "ESP32-S3 (LX7)"       }

    env:
      GCC_VERSION: ${{ needs.get-version.outputs.gcc_version }}
      GLIBC_VERSION: "2.26"
      LINUX_VERSION: "6.8"
      TARGET: xtensa-${{ matrix.variant.core }}-linux-gnu
      INSTALL_DIR: /opt/xtensa-${{ matrix.variant.core }}
      VARIANT: ${{ matrix.variant.core }}
      CHIP: ${{ matrix.variant.chip }}

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          # A full GCC build needs ~15 GB of free disk space
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Install build dependencies
        run: |
          sudo sed -i 's/^\(\s*Types:\s*\)deb\(.*\)/\1deb deb-src\2/' \
            /etc/apt/sources.list.d/ubuntu.sources
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ make \
            autoconf automake libtool libtool-bin \
            bison flex texinfo gawk \
            wget curl git xz-utils bzip2 unzip \
            libgmp-dev libmpfr-dev libmpc-dev \
            libncurses5-dev libexpat-dev \
            pkg-config cmake ninja-build \
            dpkg-dev devscripts debhelper \
            qemu-user


      - name: Download and extract Linux ${{ env.LINUX_VERSION }} kernel source
        run: |
          mkdir -p build
          if [ ! -d "linux-${LINUX_VERSION}" ]; then
            wget -q --show-progress \
              "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${LINUX_VERSION}.tar.xz"
            tar xf "linux-${LINUX_VERSION}.tar.xz"
          fi

      - name: Build binutils for ${{ env.TARGET }}
        run: bash scripts/build-binutils.sh "${VARIANT}" "${CHIP}"

      - name: Add toolchain bin to PATH
        run: echo "${INSTALL_DIR}/bin" >> $GITHUB_PATH

      - name: Install Linux ${{ env.LINUX_VERSION }} kernel headers for xtensa into sysroot
        run: |
          SYSROOT="${INSTALL_DIR}/${TARGET}/sysroot"
          mkdir -p "${SYSROOT}/usr"
          cd "linux-${LINUX_VERSION}"
          make ARCH=xtensa headers_install INSTALL_HDR_PATH="${SYSROOT}/usr"
          echo "Installed kernel headers:"
          ls "${SYSROOT}/usr/include/" | head -10

      - name: Build GCC ${{ env.GCC_VERSION }} stage 1 (bootstrap) for ${{ env.TARGET }}
        run: bash scripts/build-gcc-stage1.sh "${VARIANT}" "${CHIP}"

      # build-glibc.sh fetches source via apt-get source, builds glibc (into the sysroot),
      # and creates the DEB packages. It must run after GCC stage 1 and kernel headers,
      # but BEFORE GCC final (which needs the sysroot with glibc to link libstdc++ etc.)
      - name: Build glibc ${{ env.GLIBC_VERSION }} for ${{ env.TARGET }} and create DEB packages
        run: bash scripts/build-glibc.sh "${VARIANT}" "${CHIP}"

      - name: Build GCC ${{ env.GCC_VERSION }} final for ${{ env.TARGET }}
        run: bash scripts/build-gcc-final.sh "${VARIANT}" "${CHIP}"

      - name: Verify toolchain — smoke test with qemu-user
        run: |
          echo "=== Compiler ==="
          "${INSTALL_DIR}/bin/${TARGET}-gcc" --version
          SYSROOT=$("${INSTALL_DIR}/bin/${TARGET}-gcc" -print-sysroot)
          echo "Sysroot: ${SYSROOT}"
          ls "${SYSROOT}/usr/lib/" | head -15

          echo "=== Compile and run Hello World under qemu-xtensa ==="
          printf '#include <stdio.h>\nint main(void){puts("hello xtensa");return 0;}\n' \
            > /tmp/hello.c
          "${INSTALL_DIR}/bin/${TARGET}-gcc" -o /tmp/hello /tmp/hello.c
          file /tmp/hello
          qemu-xtensa -L "${SYSROOT}" /tmp/hello

      - name: Create toolchain DEB package
        run: |
          PKG_NAME="xtensa-${VARIANT}-linux-gnu-toolchain"
          PKG_VERSION="${GCC_VERSION}"
          PKG_ARCH="amd64"
          PKG_DIR="${PKG_NAME}_${PKG_VERSION}_${PKG_ARCH}"

          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/opt"
          cp -r "${INSTALL_DIR}" "${PKG_DIR}/opt/"

          INSTALLED_SIZE=$(du -sk "${PKG_DIR}/opt" | cut -f1)

          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: ${PKG_NAME}
          Version: ${PKG_VERSION}
          Section: devel
          Priority: optional
          Architecture: ${PKG_ARCH}
          Installed-Size: ${INSTALLED_SIZE}
          Maintainer: GitHub Actions <noreply@github.com>
          Description: Xtensa GNU Toolchain for ${{ matrix.variant.name }} (Linux/glibc)
           Cross-compilation toolchain for Xtensa ${{ matrix.variant.name }} targeting
           Linux userspace with glibc.  Uses the windowed register ABI (call8),
           matching the ESP-IDF ABI.
           .
           Suitable for cross-compiling AtomVM and running tests under qemu-user-xtensa.
           .
           GCC: ${GCC_VERSION}  Binutils: 2.42  glibc: ${GLIBC_VERSION}
           Core: ${VARIANT}  Chip: ${CHIP}
           Target triple: ${TARGET}
          EOF

          cat > "${PKG_DIR}/DEBIAN/postinst" << 'POSTINST'
          #!/bin/bash
          set -e
          echo "Add /opt/xtensa-${{ matrix.variant.core }}/bin to your PATH:"
          echo "  export PATH=/opt/xtensa-${{ matrix.variant.core }}/bin:\$PATH"
          POSTINST
          chmod 755 "${PKG_DIR}/DEBIAN/postinst"

          dpkg-deb --build --root-owner-group "${PKG_DIR}"

          echo "pkg_name=${PKG_NAME}" >> $GITHUB_ENV
          echo "pkg_version=${PKG_VERSION}" >> $GITHUB_ENV

      - name: List glibc packages
        run: ls -lh build/libc6*-${VARIANT}*.deb 2>/dev/null || true

      - name: Build zlib packages
        run: bash scripts/build-zlib.sh "${VARIANT}" "${CHIP}"

      - name: List zlib packages
        run: ls -lh build/zlib1g*-${VARIANT}*.deb 2>/dev/null || true

      - name: Build mbedtls packages
        run: bash scripts/build-mbedtls.sh "${VARIANT}" "${CHIP}"

      - name: List mbedtls packages
        run: ls -lh build/libmbed*-${VARIANT}*.deb 2>/dev/null || true

      - name: Upload DEB packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.pkg_name }}-${{ env.pkg_version }}
          path: |
            *.deb
            build/*.deb
          retention-days: 90

  create-release:
    needs: [get-version, build]
    runs-on: ubuntu-24.04
    if: needs.get-version.outputs.is_tag == 'true'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages

      - name: Move packages to release directory
        run: |
          mkdir -p release-packages
          find packages -name "*.deb" -exec mv {} release-packages/ \;
          ls -lh release-packages/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ github.repository }}
          tag_name: xtensa-toolchain-${{ needs.get-version.outputs.release_tag }}
          name: Xtensa GNU Toolchain GCC ${{ needs.get-version.outputs.release_tag }}
          body: |
            # Xtensa GNU Toolchain DEB Packages

            GCC version: **${{ needs.get-version.outputs.gcc_version }}**

            ## Packages

            | Package | Core | Chips | ABI |
            |---------|------|-------|-----|
            | xtensa-lx6-linux-gnu-toolchain | LX6 | ESP32, ESP32-S2 | windowed (call8) |
            | xtensa-lx7-linux-gnu-toolchain | LX7 | ESP32-S3 | windowed (call8) |

            ## Installation

            ```bash
            sudo dpkg -i xtensa-lx6-linux-gnu-toolchain_*.deb
            export PATH=/opt/xtensa-lx6/bin:$PATH

            sudo dpkg -i libc6-lx6_*.deb libc6-dev-lx6_*.deb
            sudo dpkg -i zlib1g-lx6_*.deb zlib1g-dev-lx6_*.deb
            ```

            ## Running with qemu-user

            ```bash
            xtensa-lx6-linux-gnu-gcc -o hello hello.c
            SYSROOT=$(xtensa-lx6-linux-gnu-gcc -print-sysroot)
            qemu-xtensa -L "$SYSROOT" ./hello
            ```
          files: release-packages/*.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
